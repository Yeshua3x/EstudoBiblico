<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos Bíblicos</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: auto;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .study-links {
            margin-top: 30px;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px 0;
            transition: background-color 0.3s, transform 0.2s;
        }
        button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
    </style>
    <script>
        let atividades = [];

        async function loadAtividades() {
            const response = await fetch('atividades.json');
            atividades = await response.json();
            displayStudyLinks();
        }

        function displayStudyLinks() {
            const linksContainer = document.getElementById("studyLinks");
            linksContainer.innerHTML = `
                <h2>Estudos Bíblicos</h2>
                ${atividades.map(atividade => `
                    <button onclick="location.href='${atividade.url}'">${atividade.titulo}</button>
                `).join('')}
                <button onclick="location.href='index.html'">Retornar à Página Inicial</button>
            `;
        }

        window.onload = loadAtividades;
    </script>
</head>
<body>

    <h1>Estudos Bíblicos</h1>

    <div class="study-links" id="studyLinks"></div>

</body>
</html>
