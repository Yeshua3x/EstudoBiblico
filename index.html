<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo Bíblico</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #conteudoEstudo {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            display: none; /* Esconde inicialmente */
        }
        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1>Estudo Bíblico</h1>
    <button onclick="carregarEstudo('estudo1')">Estudo 1</button>
    <button onclick="carregarEstudo('estudo2')">Estudo 2</button>
    <button onclick="carregarEstudo('estudo3')">Estudo 3</button>

    <div id="conteudoEstudo"></div>

    <script>
        function carregarEstudo(estudo) {
            fetch('estudos.json')
                .then(response => response.json())
                .then(data => {
                    const conteudoDiv = document.getElementById('conteudoEstudo');
                    conteudoDiv.innerHTML = `<h2>${data[estudo].titulo}</h2><p>${data[estudo].conteudo}</p>`;
                    conteudoDiv.style.display = 'block'; // Mostra a div após carregar o conteúdo
                })
                .catch(error => console.error('Erro ao carregar o conteúdo:', error));
        }
    </script>

</body>
</html>
