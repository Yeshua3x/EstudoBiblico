<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Estudo Bíblico</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
padding:30px;
text-align:center;
}

h1{
color:#333;
}

.container{
max-width:800px;
margin:auto;
}

.buttons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-top:20px;
}

button{

background:#007BFF;
color:white;
border:none;
padding:12px 16px;
border-radius:5px;
cursor:pointer;
font-size:16px;
transition:0.3s;

}

button:hover{

background:#0056b3;
transform:scale(1.05);

}

.estudo{

margin-top:30px;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:left;

}

</style>
</head>

<body>

<div class="container">

<h1>Estudo Bíblico</h1>

<div id="buttons" class="buttons"></div>

<div id="conteudo" class="estudo">
Clique em um estudo para visualizar o conteúdo.
</div>

</div>

<script>

let estudos=[];

async function carregarEstudos(){

const resposta = await fetch("estudos.json");

estudos = await resposta.json();

criarBotoes();

}

function criarBotoes(){

const area = document.getElementById("buttons");

area.innerHTML="";

estudos.forEach((estudo,index)=>{

const botao=document.createElement("button");

botao.innerText=estudo.titulo;

botao.onclick=()=>mostrarEstudo(index);

area.appendChild(botao);

});

}

function mostrarEstudo(index){

const estudo = estudos[index];

const area=document.getElementById("conteudo");

area.innerHTML = `
<h2>${estudo.titulo}</h2>
<p>${estudo.conteudo}</p>
`;

}

carregarEstudos();

</script>

</body>
</html>
