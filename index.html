<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livros do Novo Testamento</title>

<style>
body {
    font-family: 'Roboto', sans-serif;
    background-color: #f4f4f4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: auto;
    margin: 0;
    padding: 20px;
}

h1 {
    color: #333;
    margin-bottom: 20px;
}

.search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input[type="text"] {
    padding: 10px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 5px;
    width: 200px;
}

button {
    background-color: #007BFF;
    color: white;
    border: none;
    padding: 10px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
    transition: background-color 0.3s, transform 0.2s;
}

button:hover {
    background-color: #0056b3;
    transform: scale(1.05);
}

.quiz-container {
    margin-top: 30px;
    width: 100%;
    max-width: 600px;
}

.question {
    margin: 10px 0;
}

.result {
    margin-top: 20px;
}

/* NOVA ÁREA DE ESTUDOS */

.study-container{
margin-top:30px;
width:100%;
max-width:600px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.study-content{
margin-top:20px;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
max-width:600px;
}
</style>

<script>

let livros = [];
let quiz = [];
let estudos = [];

let score = 0;
let currentQuestionIndex = 0;


// =============================
// CARREGAR JSON
// =============================

async function loadBooks() {
    const response = await fetch('livros.json');
    livros = await response.json();
}

async function loadQuiz() {
    const response = await fetch('quiz.json');
    quiz = await response.json();
    displayQuestion();
}

/* NOVA FUNÇÃO */
async function loadEstudos(){
const response = await fetch('estudos.json');
estudos = await response.json();
renderStudyButtons();
}


// =============================
// QUIZ
// =============================

function displayQuestion() {
const questionContainer = document.getElementById("questionContainer");

const currentQuestion = quiz[currentQuestionIndex];

questionContainer.innerHTML = `
<div class="question">${currentQuestion.pergunta}</div>

${currentQuestion.opcoes.map((opcao,index)=>`
<button onclick="checkAnswer('${opcao}')">${opcao}</button>
`).join('')}

`;
}

function checkAnswer(selectedOption) {

const currentQuestion = quiz[currentQuestionIndex];

if (selectedOption === currentQuestion.resposta_correta){
score++;
}

currentQuestionIndex++;

if(currentQuestionIndex < quiz.length){
displayQuestion();
}else{
showResult();
}

}

function showResult(){

const questionContainer = document.getElementById("questionContainer");

questionContainer.innerHTML = `
<div class="result">Você acertou ${score} de ${quiz.length} perguntas!</div>

<button onclick="resetQuiz()">Reiniciar Quiz</button>
`;

}

function resetQuiz(){
score = 0;
currentQuestionIndex = 0;
displayQuestion();
}


// =============================
// BUSCA LIVROS
// =============================

function searchBook(){

const input = document.getElementById("bookSearch").value.toLowerCase().trim();

const foundBook = livros.find(book=>book.titulo.toLowerCase()===input);

if(foundBook){
window.location.href = foundBook.url;
}else{
alert('Livro não encontrado. Tente novamente.');
}

}


// =============================
// SISTEMA DE ESTUDO
// =============================

function renderStudyButtons(){

const container = document.getElementById("studyButtons");

container.innerHTML = estudos.map(estudo=>`
<button onclick="openStudy('${estudo.titulo}')">${estudo.titulo}</button>
`).join('');

}

function openStudy(titulo){

const estudo = estudos.find(e=>e.titulo === titulo);

const content = document.getElementById("studyContent");

content.innerHTML = `
<h3>${estudo.titulo}</h3>
<p>${estudo.conteudo}</p>
`;

}


// =============================
// LOAD
// =============================

window.onload = async () => {

await loadBooks();
await loadQuiz();
await loadEstudos();

}

</script>
</head>

<body>

<h1>Livros do Novo Testamento</h1>

<div class="search-bar">
<input type="text" id="bookSearch" placeholder="Digite o nome de um livro...">
<button onclick="searchBook()">Buscar</button>
</div>


<!-- QUIZ -->

<div class="quiz-container" id="questionContainer"></div>


<!-- ESTUDOS -->

<h2>Área de Estudos</h2>

<div class="study-container" id="studyButtons"></div>

<div class="study-content" id="studyContent"></div>


</body>
</html>
